<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>곰 Gom | Video Editor</title>
  <style>
    @font-face {
      font-family: 'Epilogue';
      src: url('Epilogue-Bold.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Fontspring';
      src: url('Fontspring-DEMO-argentcf-regular.otf') format('opentype');
    }
    @font-face {
      font-family: 'CSCalgaryPixel';
      src: url('CSCalgaryPixel-Regular_demo-BF69895eeaca507.otf') format('opentype');
    }
    @font-face {
      font-family: 'Paperlogy';
      src: url('Paperlogy-4Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #ffffff;
      background-image:
        linear-gradient(#d0d0d0 1px, transparent 1px),
        linear-gradient(90deg, #d0d0d0 1px, transparent 1px);
      background-size: 40px 40px;
      font-family: 'Paperlogy', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 48px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 2px solid #222;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-family: 'CSCalgaryPixel', cursive;
      font-size: 1.8rem;
      font-weight: 700;
      color: #222;
      border: 2.5px solid #222;
      padding: 4px 14px;
      border-radius: 6px;
      letter-spacing: 8px;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: #222;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Paperlogy', sans-serif;
    }

    .nav-btn {
      background: rgba(255,255,255,0.85) !important;
      color: #222 !important;
      padding: 7px 18px !important;
      border-radius: 999px;
      border: 1.5px solid #222 !important;
      font-size: 0.85rem !important;
      font-family: 'Paperlogy', sans-serif !important;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .nav-btn:hover { background: #f5f5f5 !important; }
    .nav-btn .dot {
      width: 0.85rem;
      height: 0.85rem;
      min-width: 0.85rem;
      background: #e2e8b0;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 88vh;
      padding: 60px 24px 40px;
      text-align: center;
      position: relative;
    }

    /* 떠다니는 스티커 */
    .sticker {
      position: absolute;
      font-size: 2.2rem;
      animation: float 3.5s ease-in-out infinite;
      user-select: none;
    }
    .s1 { top: 28%; left: 12%;  animation-delay: 0s; }
    .s2 { top: 22%; right: 14%; animation-delay: 0.6s; }
    .s3 { bottom: 58%; left: 12%; animation-delay: 1.1s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-3deg); }
      50%       { transform: translateY(-14px) rotate(3deg); }
    }

    /* 메인 타이틀 */
    .hero-title {
      line-height: 0.90;
      color: #2c2b2b;
      margin-bottom: 40px;
    }

    .hero-title .line1 {
  display: block;
  font-family: 'Epilogue', sans-serif;
  font-size: clamp(4.5rem, 13vw, 11rem);
  letter-spacing: -2px;
}

    .hero-title .line2 {
      display: inline-block;
      font-family: 'Fontspring', serif;
      font-size: clamp(4.5rem, 13vw, 11rem);
      color: #2c2b2b;
      letter-spacing: 2px;
      font-weight: 500;
    }

    /* 버튼 그룹 */
    .hero-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 40px;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 999px;
      border: 1px solid #222;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Paperlogy', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: #222;
    }
    .btn:hover { transform: translate(-2px, -2px); }
    .btn .dot {
      width: 1rem;
      height: 1rem;
      min-width: 1rem;
      background: #e2e8b0;
      border-radius: 50%;
      display: inline-block;
    }

    /* 스크롤 힌트 */
    .scroll-hint {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 1px;
      font-family: 'Paperlogy', sans-serif;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(6px); }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">Gom.</div>
    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#" class="nav-btn"><span class="dot"></span>문의하기</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">

    <span class="sticker s1">🎥</span>
    <span class="sticker s2">💬</span>
    <span class="sticker s3">🖥️</span>

    <h1 class="hero-title">
      <span class="line1">the video edit</span>
      <span class="line2">for every creator</span>
    </h1>

    <div class="hero-buttons">
      <a href="#" class="btn"><span class="dot"></span>작업물 보기</a>
      <a href="#" class="btn"><span class="dot"></span>문의하기</a>
    </div>

    <div class="scroll-hint">↓ scroll down ↓</div>

  </section>

</body>
</html>
